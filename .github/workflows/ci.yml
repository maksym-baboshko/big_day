name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Start local Supabase
        run: pnpm exec supabase start --yes

      - name: Reset local Supabase database
        run: pnpm exec supabase db reset --local --yes

      - name: Verify generated Supabase types
        run: pnpm supabase:types:check -- --verify-output --local

      - name: Export local Supabase env
        run: |
          pnpm exec supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            --override-name auth.service_role_key=SUPABASE_SECRET_KEY >> "$GITHUB_ENV"

      - name: Verify smoke env
        run: pnpm verify:env

      - name: Browser E2E
        run: pnpm exec playwright test

      - name: Smoke test games flow
        run: pnpm smoke:games

      - name: Stop local Supabase
        if: always()
        run: pnpm exec supabase stop --no-backup
